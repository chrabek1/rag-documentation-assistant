services:
  backend:
    build: ./backend
    container_name: rag-backend

    env_file:
    - .env

    ports:
    - "8000:8000"

    depends_on:
      - qdrant

  embedding-service:
    build: ./embedding_service
    container_name: rag-embedding_service

    env_file:
    - .env

    ports:
    - "8001:8001"
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: